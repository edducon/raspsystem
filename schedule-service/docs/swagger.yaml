host: localhost:8080
info:
  contact: {}
  description: API for schedules
  title: Raspyx
  version: 2.0.0
paths:
  /v2/groups:
    get:
      consumes:
      - application/json
      description: Получение списка всех учебных групп в системе
      produces:
      - application/json
      responses:
        "200":
          description: Данные об учебных группах успешно получены
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/models.Group'
                  type: array
              type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Получение учебных групп
      tags:
      - groups
    post:
      consumes:
      - application/json
      description: Создание новой учебной группы
      parameters:
      - description: Данные новой учебной группы
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AddGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Учебная группа успешно создана
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.GroupResponse'
              type: object
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "409":
          description: Конфликт при создании учебной группы
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Добавление учебной группы
      tags:
      - groups
  /v2/groups/{group_uuid}:
    delete:
      consumes:
      - application/json
      description: Удаление учебной группы из системы по её идентификатору
      parameters:
      - description: Идентификатор учебной группы
        in: path
        name: group_uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Учебная группа успешно удалена
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.GroupResponse'
              type: object
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "404":
          description: Учебная группа не найдена
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "409":
          description: Конфликт при удалении учебной группы
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Удаление учебной группы
      tags:
      - groups
    put:
      consumes:
      - application/json
      description: Обновление информации об учебной группе по её идентификатору
      parameters:
      - description: Идентификатор учебной группы
        in: path
        name: group_uuid
        required: true
        type: string
      - description: Данные для обновления учебной группы
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Данные об учебной группе успешно обновлены
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.GroupResponse'
              type: object
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "404":
          description: Учебная группа не найдена
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "409":
          description: Конфликт при обновлении учебной группы
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Обновление учебной группы
      tags:
      - groups
  /v2/groups/number/{group_number}:
    get:
      consumes:
