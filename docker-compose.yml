services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 4321
    ports:
      - "4321:4321"
    env_file:
      - .env.example
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: /app/entrypoint.sh
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rasp_db
      POSTGRES_USER: rasp_user
      POSTGRES_PASSWORD: rasp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
