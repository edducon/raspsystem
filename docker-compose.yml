services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 4321
    ports:
      - "4321:4321"
    env_file:
      - .env
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_SERVER}:${POSTGRES_PORT}/${POSTGRES_DB}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres-schedule:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SCHEDULE_DB_NAME:-schedule_db}
      POSTGRES_USER: ${SCHEDULE_DB_USER:-schedule_user}
      POSTGRES_PASSWORD: ${SCHEDULE_DB_PASSWORD:-schedule_password}
    volumes:
      - postgres_schedule_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SCHEDULE_DB_USER:-schedule_user} -d ${SCHEDULE_DB_NAME:-schedule_db}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  schedule-service:
    build:
      context: ./schedule-service
    depends_on:
      postgres-schedule:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      DB_HOST: ${SCHEDULE_DB_HOST:-postgres-schedule}
      DB_PORT: ${SCHEDULE_DB_PORT:-5432}
      DB_USER: ${SCHEDULE_DB_USER:-schedule_user}
      DB_PASSWORD: ${SCHEDULE_DB_PASSWORD:-schedule_password}
      DB_NAME: ${SCHEDULE_DB_NAME:-schedule_db}
    networks:
      - internal
    restart: unless-stopped

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  postgres_schedule_data:

networks:
  internal:
    internal: true
